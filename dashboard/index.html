<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Dashboard | Neon Auto Transport</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --dark: #0a2540;
            --dark-mid: #0f3460;
            --dark-surface: #132f4c;
            --dark-border: #1e4976;
            --slate: #a1b0c0;
            --white: #ffffff;
            --primary: #635bff;
            --cyan: #00d4ff;
            --green: #39FF14;
            --red: #e31837;
            --amber: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- Login Gate ---- */
        #login-gate {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2540, #0f3460);
        }

        .login-card {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .login-card h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.03em;
        }

        .login-card h1 span { color: var(--cyan); }

        .login-card p {
            font-size: 13px;
            color: var(--slate);
            margin-bottom: 24px;
        }

        .login-card input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            background: var(--dark);
            color: var(--white);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-card input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,91,255,0.2);
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: var(--white);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .login-card button:hover { background: #534be8; }

        .login-error {
            color: var(--red);
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        /* ---- Dashboard ---- */
        #dashboard { display: none; }

        .dash-header {
            background: var(--dark-surface);
            border-bottom: 1px solid var(--dark-border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dash-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .dash-header h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .dash-header h1 span { color: var(--cyan); }

        .dash-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dash-btn {
            padding: 8px 16px;
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            background: var(--dark);
            color: var(--slate);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .dash-btn:hover {
            border-color: var(--primary);
            color: var(--white);
        }

        .dash-btn.danger:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* ---- Stats Row ---- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 24px 32px;
        }

        .stat-card {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 11px;
            font-weight: 700;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.03em;
        }

        .stat-card .value.green { color: var(--green); }
        .stat-card .value.cyan { color: var(--cyan); }
        .stat-card .value.amber { color: var(--amber); }
        .stat-card .value.red { color: var(--red); }

        /* ---- Filters ---- */
        .filters-row {
            padding: 0 32px 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--dark-border);
            border-radius: 20px;
            background: transparent;
            color: var(--slate);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--white);
        }

        /* ---- Leads Table ---- */
        .table-wrapper {
            padding: 0 32px 32px;
            overflow-x: auto;
        }

        .leads-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--dark-surface);
            border-radius: 12px;
            border: 1px solid var(--dark-border);
            overflow: hidden;
        }

        .leads-table thead th {
            background: var(--dark);
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 700;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: left;
            border-bottom: 1px solid var(--dark-border);
            white-space: nowrap;
        }

        .leads-table tbody tr {
            cursor: pointer;
            transition: background 0.15s;
        }

        .leads-table tbody tr:hover {
            background: rgba(99, 91, 255, 0.08);
        }

        .leads-table tbody td {
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid rgba(30, 73, 118, 0.3);
            white-space: nowrap;
        }

        .leads-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Score Badges */
        .score-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .score-hot { background: rgba(227, 24, 55, 0.15); color: #ff6b6b; }
        .score-warm { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
        .score-cold { background: rgba(0, 212, 255, 0.15); color: var(--cyan); }

        /* Status Badges */
        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
        }

        .status-new { background: rgba(57, 255, 20, 0.15); color: var(--green); }
        .status-contacted { background: rgba(99, 91, 255, 0.15); color: var(--primary); }
        .status-quoted { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
        .status-booked { background: rgba(0, 212, 255, 0.15); color: var(--cyan); }
        .status-delivered { background: rgba(57, 255, 20, 0.3); color: var(--green); }

        /* ---- Lead Detail Modal ---- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal-card {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            width: 600px;
            max-width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--dark-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--dark-surface);
            z-index: 1;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .modal-close {
            background: none;
            border: 1px solid var(--dark-border);
            color: var(--slate);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .modal-body { padding: 24px; }

        .modal-section {
            margin-bottom: 24px;
        }

        .modal-section h3 {
            font-size: 12px;
            font-weight: 700;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--dark-border);
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-field .label {
            font-size: 10px;
            font-weight: 700;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 3px;
        }

        .modal-field .value {
            font-size: 14px;
            font-weight: 600;
            color: var(--white);
        }

        .modal-notes textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            background: var(--dark);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            color: var(--white);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            outline: none;
        }

        .modal-notes textarea:focus {
            border-color: var(--primary);
        }

        .modal-status-select {
            width: 100%;
            padding: 10px;
            background: var(--dark);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            color: var(--white);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .modal-save-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: var(--white);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s;
        }

        .modal-save-btn:hover { background: #534be8; }

        .modal-crm-btn {
            width: 100%;
            padding: 12px;
            background: var(--green);
            color: #0a2540;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
        }

        .modal-crm-btn:hover { opacity: 0.9; }

        .modal-synced-badge {
            width: 100%;
            padding: 10px;
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            margin-top: 10px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--slate);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 8px; }
        .empty-state p { font-size: 13px; }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-row { padding: 16px; }
            .table-wrapper { padding: 0 16px 16px; }
            .filters-row { padding: 0 16px 12px; }
            .dash-header { padding: 12px 16px; }
            .modal-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Login Gate -->
    <div id="login-gate">
        <div class="login-card">
            <h1>NEON <span>DISPATCH</span></h1>
            <p>Enter dispatcher password to access the lead dashboard</p>
            <input type="password" id="login-password" placeholder="Password" autofocus>
            <button id="login-btn" onclick="attemptLogin()">Access Dashboard</button>
            <p class="login-error" id="login-error">Incorrect password. Try again.</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">

        <!-- Header -->
        <div class="dash-header">
            <div class="dash-header-left">
                <h1>NEON <span>DISPATCH</span></h1>
            </div>
            <div class="dash-header-right">
                <button class="dash-btn" onclick="refreshLeads()">↻ Refresh</button>
                <button class="dash-btn" onclick="exportCSV()">↓ Export CSV</button>
                <button class="dash-btn danger" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row" id="stats-row">
            <div class="stat-card">
                <div class="label">Total Leads</div>
                <div class="value cyan" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Hot Leads</div>
                <div class="value red" id="stat-hot">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Today</div>
                <div class="value green" id="stat-today">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Booked</div>
                <div class="value amber" id="stat-booked">0</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-row" id="filters-row">
            <button class="filter-btn active" data-filter="all" onclick="filterLeads('all', this)">All</button>
            <button class="filter-btn" data-filter="new" onclick="filterLeads('New Lead', this)">New</button>
            <button class="filter-btn" data-filter="contacted" onclick="filterLeads('Contacted', this)">Contacted</button>
            <button class="filter-btn" data-filter="quoted" onclick="filterLeads('Quoted', this)">Quoted</button>
            <button class="filter-btn" data-filter="booked" onclick="filterLeads('Booked', this)">Booked</button>
            <button class="filter-btn" data-filter="delivered" onclick="filterLeads('Delivered', this)">Delivered</button>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table class="leads-table">
                <thead>
                    <tr>
                        <th>Lead ID</th>
                        <th>Date</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Route</th>
                        <th>Vehicle</th>
                        <th>Transport</th>
                        <th>Score</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="leads-tbody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Lead Detail Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title">Lead Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <script>
        // Simple password — for demo/internal use only. Production should use proper auth.
        const DASHBOARD_PASSWORD = 'neon2026';

        let allLeads = [];
        let currentFilter = 'all';

        // ---- Login ----
        function attemptLogin() {
            const pw = document.getElementById('login-password').value;
            if (pw === DASHBOARD_PASSWORD) {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                sessionStorage.setItem('neon_dash_auth', 'true');
                refreshLeads();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // Enter key login
        document.getElementById('login-password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') attemptLogin();
        });

        // Auto-login if session active
        if (sessionStorage.getItem('neon_dash_auth') === 'true') {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            refreshLeads();
        }

        function logout() {
            sessionStorage.removeItem('neon_dash_auth');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('login-gate').style.display = 'flex';
            document.getElementById('login-password').value = '';
        }

        // ---- Load Leads ----
        function refreshLeads() {
            try {
                allLeads = JSON.parse(localStorage.getItem('neon_ai_leads') || '[]');
                // Sort by newest first
                allLeads.sort(function(a, b) {
                    return new Date(b.createdAt) - new Date(a.createdAt);
                });
            } catch(e) {
                allLeads = [];
            }
            updateStats();
            renderTable(currentFilter);
        }

        // ---- Update Stats ----
        function updateStats() {
            var total = allLeads.length;
            var hot = allLeads.filter(function(l) { return l.leadScore && l.leadScore.includes('Hot'); }).length;
            var today = allLeads.filter(function(l) {
                return l.createdAt && new Date(l.createdAt).toDateString() === new Date().toDateString();
            }).length;
            var booked = allLeads.filter(function(l) { return l.status === 'Booked'; }).length;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-hot').textContent = hot;
            document.getElementById('stat-today').textContent = today;
            document.getElementById('stat-booked').textContent = booked;
        }

        // ---- Render Table ----
        function renderTable(filter) {
            var tbody = document.getElementById('leads-tbody');
            var filtered = filter === 'all' ? allLeads : allLeads.filter(function(l) { return l.status === filter; });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="icon">📭</div><h3>No leads yet</h3><p>Leads captured by the AI chat widget will appear here automatically.</p></div></td></tr>';
                return;
            }

            var html = '';
            filtered.forEach(function(lead, idx) {
                var f = lead.fields || {};
                var name = ((f.firstName || '') + ' ' + (f.lastName || '')).trim() || 'Unknown';
                var phone = f.phone || '-';
                var route = 'Zip: ' + (f.pickupZip || '?') + ' → Zip: ' + (f.deliveryZip || '?');
                var vehicle = ((f.vehicleYear || '') + ' ' + (f.vehicleMake || '') + ' ' + (f.vehicleModel || '')).trim() || '-';
                var transport = f.transportType || '-';
                var date = lead.createdAt ? new Date(lead.createdAt).toLocaleDateString() : '-';

                var scoreClass = 'score-cold';
                if (lead.leadScore && lead.leadScore.includes('Hot')) scoreClass = 'score-hot';
                else if (lead.leadScore && lead.leadScore.includes('Warm')) scoreClass = 'score-warm';

                var statusClass = 'status-new';
                if (lead.status === 'Contacted') statusClass = 'status-contacted';
                else if (lead.status === 'Quoted') statusClass = 'status-quoted';
                else if (lead.status === 'Booked') statusClass = 'status-booked';
                else if (lead.status === 'Delivered') statusClass = 'status-delivered';

                html += '<tr onclick="openModal(\'' + lead.id + '\')">' +
                    '<td style="font-family:monospace;font-size:11px;color:var(--slate)">' + (lead.id || '-') + '</td>' +
                    '<td>' + date + '</td>' +
                    '<td style="font-weight:700">' + escapeHTML(name) + '</td>' +
                    '<td>' + escapeHTML(phone) + '</td>' +
                    '<td>' + escapeHTML(route) + '</td>' +
                    '<td>' + escapeHTML(vehicle) + '</td>' +
                    '<td>' + escapeHTML(transport) + '</td>' +
                    '<td><span class="score-badge ' + scoreClass + '">' + (lead.leadScore || '-') + '</span></td>' +
                    '<td><span class="status-badge ' + statusClass + '">' + escapeHTML(lead.status || 'New Lead') + '</span></td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
        }

        // ---- Filter ----
        function filterLeads(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            renderTable(filter);
        }

        // ---- Lead Detail Modal ----
        function openModal(leadId) {
            var lead = allLeads.find(function(l) { return l.id === leadId; });
            if (!lead) return;

            var f = lead.fields || {};
            var name = ((f.firstName || '') + ' ' + (f.lastName || '')).trim();
            var vehicle = ((f.vehicleYear || '') + ' ' + (f.vehicleMake || '') + ' ' + (f.vehicleModel || '')).trim();

            document.getElementById('modal-title').textContent = name || 'Lead Details';
            document.getElementById('modal-body').innerHTML =
                '<div class="modal-section">' +
                    '<h3>Customer Information</h3>' +
                    '<div class="modal-grid">' +
                        '<div class="modal-field"><div class="label">Name</div><div class="value">' + escapeHTML(name || '-') + '</div></div>' +
                        '<div class="modal-field"><div class="label">Phone</div><div class="value">' + escapeHTML(f.phone || '-') + '</div></div>' +
                        '<div class="modal-field"><div class="label">Email</div><div class="value">' + escapeHTML(f.email || '-') + '</div></div>' +
                        '<div class="modal-field"><div class="label">Lead Score</div><div class="value">' + (lead.leadScore || '-') + '</div></div>' +
                    '</div>' +
                '</div>' +

                '<div class="modal-section">' +
                    '<h3>Vehicle Information</h3>' +
                    '<div class="modal-grid">' +
                        '<div class="modal-field"><div class="label">Vehicle</div><div class="value">' + escapeHTML(vehicle || '-') + '</div></div>' +
                        '<div class="modal-field"><div class="label">Type</div><div class="value">' + escapeHTML(f.vehicleType || '-') + '</div></div>' +
                        '<div class="modal-field"><div class="label">Condition</div><div class="value">' + escapeHTML(f.vehicleCondition || '-') + '</div></div>' +
                        '<div class="modal-field"><div class="label">Transport</div><div class="value">' + escapeHTML(f.transportType || '-') + '</div></div>' +
                    '</div>' +
                '</div>' +

                '<div class="modal-section">' +
                    '<h3>Route Information</h3>' +
                    '<div class="modal-grid">' +
                        '<div class="modal-field"><div class="label">Pickup Zipcode</div><div class="value">' + escapeHTML(f.pickupZip || '-') + '</div></div>' +
                        '<div class="modal-field"><div class="label">Delivery Zipcode</div><div class="value">' + escapeHTML(f.deliveryZip || '-') + '</div></div>' +
                        '<div class="modal-field"><div class="label">Pickup Date</div><div class="value">' + escapeHTML(f.desiredPickupDate || 'Not specified') + '</div></div>' +
                        '<div class="modal-field"><div class="label">Created</div><div class="value">' + (lead.createdAt ? new Date(lead.createdAt).toLocaleString() : '-') + '</div></div>' +
                    '</div>' +
                '</div>' +

                '<div class="modal-section">' +
                    '<h3>Additional Details</h3>' +
                    '<div class="modal-grid">' +
                        '<div class="modal-field"><div class="label">Modified</div><div class="value">' + escapeHTML(String(f.isModified || 'N/A')) + '</div></div>' +
                        '<div class="modal-field"><div class="label">Lifted</div><div class="value">' + escapeHTML(String(f.isLifted || 'N/A')) + '</div></div>' +
                        '<div class="modal-field"><div class="label">Inoperable</div><div class="value">' + escapeHTML(String(f.isInoperable || 'N/A')) + '</div></div>' +
                        '<div class="modal-field"><div class="label">Personal Items</div><div class="value">' + escapeHTML(String(f.hasPersonalItems || 'N/A')) + '</div></div>' +
                        '<div class="modal-field"><div class="label">Multiple Vehicles</div><div class="value">' + escapeHTML(String(f.multipleVehicles || 'N/A')) + '</div></div>' +
                        '<div class="modal-field"><div class="label">Source Page</div><div class="value">' + escapeHTML(lead.source || '/') + '</div></div>' +
                    '</div>' +
                '</div>' +

                '<div class="modal-section">' +
                    '<h3>AI Notes</h3>' +
                    '<p style="font-size:13px;color:var(--slate);line-height:1.6">' + escapeHTML(lead.aiNotes || 'No notes generated.') + '</p>' +
                '</div>' +

                '<div class="modal-section modal-notes">' +
                    '<h3>Dispatcher Notes</h3>' +
                    '<textarea id="modal-dispatcher-notes" placeholder="Add your notes here...">' + escapeHTML(lead.dispatcherNotes || '') + '</textarea>' +
                '</div>' +

                '<div class="modal-section">' +
                    '<h3>Update Status</h3>' +
                    '<select class="modal-status-select" id="modal-status-select">' +
                        '<option value="New Lead"' + (lead.status === 'New Lead' ? ' selected' : '') + '>New Lead</option>' +
                        '<option value="Contacted"' + (lead.status === 'Contacted' ? ' selected' : '') + '>Contacted</option>' +
                        '<option value="Quoted"' + (lead.status === 'Quoted' ? ' selected' : '') + '>Quoted</option>' +
                        '<option value="Booked"' + (lead.status === 'Booked' ? ' selected' : '') + '>Booked</option>' +
                        '<option value="Delivered"' + (lead.status === 'Delivered' ? ' selected' : '') + '>Delivered</option>' +
                    '</select>' +
                '</div>' +

                '<button class="modal-save-btn" onclick="saveLead(\'' + lead.id + '\')">Save Changes</button>';

            if (lead.syncedWithCRM) {
                document.getElementById('modal-body').innerHTML += '<div class="modal-synced-badge">✓ Synced with Neon CRM</div>';
            } else {
                document.getElementById('modal-body').innerHTML += '<button class="modal-crm-btn" id="modal-crm-btn" onclick="sendToCRM(\'' + lead.id + '\')">📤 Send to Neon CRM</button>';
            }

            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal(event) {
            if (event && event.target !== document.getElementById('modal-overlay')) return;
            document.getElementById('modal-overlay').classList.remove('active');
        }

        // Close on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        function saveLead(leadId) {
            var leads = JSON.parse(localStorage.getItem('neon_ai_leads') || '[]');
            var lead = leads.find(function(l) { return l.id === leadId; });
            if (!lead) return;

            lead.status = document.getElementById('modal-status-select').value;
            lead.dispatcherNotes = document.getElementById('modal-dispatcher-notes').value;

            localStorage.setItem('neon_ai_leads', JSON.stringify(leads));
            closeModal();
            refreshLeads();
        }

        // ---- Send lead to CRM Database ----
        function sendToCRM(leadId) {
            var leads = JSON.parse(localStorage.getItem('neon_ai_leads') || '[]');
            var lead = leads.find(function(l) { return l.id === leadId; });
            if (!lead) return;

            var btn = document.getElementById('modal-crm-btn');
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Sending to CRM...';
            }

            fetch('/api/leads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fields: lead.fields })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    lead.syncedWithCRM = true;
                    // Update main database leads state
                    localStorage.setItem('neon_ai_leads', JSON.stringify(leads));
                    alert('Success! Lead has been exported to Neon CRM Database.');
                    closeModal();
                    refreshLeads();
                } else {
                    alert('Error saving to CRM: ' + (data.message || 'Unknown error'));
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = '📤 Send to Neon CRM';
                    }
                }
            })
            .catch(function(err) {
                alert('Connection failure to CRM API: ' + err.message);
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '📤 Send to Neon CRM';
                }
            });
        }

        // ---- Export CSV ----
        function exportCSV() {
            if (allLeads.length === 0) { alert('No leads to export.'); return; }

            var headers = ['Lead ID','Date','First Name','Last Name','Phone','Email','Pickup','Delivery','Vehicle','Transport Type','Condition','Pickup Date','Lead Score','Status','AI Notes','Dispatcher Notes'];
            var rows = allLeads.map(function(lead) {
                var f = lead.fields || {};
                return [
                    lead.id,
                    lead.createdAt ? new Date(lead.createdAt).toLocaleString() : '',
                    f.firstName || '', f.lastName || '',
                    f.phone || '', f.email || '',
                    (f.pickupCity || '') + ' ' + (f.pickupState || ''),
                    (f.deliveryCity || '') + ' ' + (f.deliveryState || ''),
                    (f.vehicleYear || '') + ' ' + (f.vehicleMake || '') + ' ' + (f.vehicleModel || ''),
                    f.transportType || '', f.vehicleCondition || '', f.desiredPickupDate || '',
                    lead.leadScore || '', lead.status || '',
                    lead.aiNotes || '', lead.dispatcherNotes || ''
                ].map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; });
            });

            var csv = headers.join(',') + '\n' + rows.map(function(r) { return r.join(','); }).join('\n');
            var blob = new Blob([csv], { type: 'text/csv' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'neon-leads-' + new Date().toISOString().slice(0,10) + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ---- Utility ----
        function escapeHTML(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str || ''));
            return div.innerHTML;
        }
    </script>
</body>
</html>
