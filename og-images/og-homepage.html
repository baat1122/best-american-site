<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Neon Auto Transport — Move Vehicles Forward</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: Inter, system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0a2540 0%, #1a3a5c 100%); position: relative; }
  .logo { position: absolute; top: 40px; left: 40px; z-index: 10; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
  .logo span { color: #00d4ff; }
  .watermark { position: absolute; top: -30px; right: 20px; font-size: 320px; font-weight: 900; color: white; opacity: 0.05; letter-spacing: -10px; line-height: 1; z-index: 1; }
  .content { position: absolute; bottom: 60px; left: 40px; z-index: 10; }
  .headline { font-size: 64px; font-weight: 900; color: white; line-height: 1.1; margin-bottom: 8px; }
  .underline { width: 120px; height: 4px; background: #39FF14; margin-bottom: 16px; border-radius: 2px; }
  .subtext { font-size: 20px; color: rgba(255,255,255,0.7); font-weight: 500; }
  .url { position: absolute; bottom: 30px; right: 40px; font-size: 14px; color: rgba(255,255,255,0.4); z-index: 10; }
</style>
</head>
<body>
  <div class="logo">NEON <span>AUTO TRANSPORT</span></div>
  <div class="watermark">NAT</div>
  <div class="content">
    <h1 class="headline">Move Vehicles Forward.</h1>
    <div class="underline"></div>
    <p class="subtext">Door-to-door · All 50 States · FMCSA Approved</p>
  </div>
  <div class="url">neonautotransport.com</div>
</body>
</html>
